  <title>Awards Gallery | L24 Cincy Car Show</title>

  <style>

    html{
      scroll-behavior:smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
      text-align: center;
    }

    .nav{
      position:sticky;
      top:0;
      z-index:1000;
      background:#070707;
      border-bottom:2px solid #3a86ff;
      padding:12px 10px;
      text-align:center;
    }

    .nav a{
      color:white;
      text-decoration:none;
      margin:8px 10px;
      font-weight:bold;
      font-size:.92rem;
    }

    .nav a:hover{
      color:#3a86ff;
    }

    .hero-banner {
      width: 100%;
      overflow: hidden;
      border-bottom: 5px solid #3a86ff;
      background-color: black;
    }

    .hero-banner img {
      width: 100%;
      display: block;
      height: auto;
    }

    .page-content {
      max-width: 1600px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .subtitle {
      color: #3a86ff;
      margin-bottom: 40px;
      font-size: 1.2rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 22px;
    }

    .gallery-item {
      overflow: hidden;
      border-radius: 14px;
      background-color: #1b1b1b;
      box-shadow: 0 0 18px rgba(0,0,0,0.45);
      transition: 0.3s ease;
    }

    .gallery-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 24px rgba(58,134,255,0.35);
    }

    .gallery-item img {
      width: 100%;
      display: block;
    }

    .button-row {
      margin-top: 50px;
    }

    .button {
      display: inline-block;
      margin: 10px;
      padding: 14px 30px;
      background-color: #3a86ff;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 0 14px rgba(58,134,255,0.25);
    }

    .button:hover {
      background-color: #2667cc;
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      background-color: #0a0a0a;
      font-size: 0.9rem;
      color: #aaa;
    }

    @media(max-width:768px){

      .nav a{
        display:inline-block;
        margin:6px 8px;
        font-size:.85rem;
      }

      h1{
        font-size:2.2rem;
      }

      .gallery-grid{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>
