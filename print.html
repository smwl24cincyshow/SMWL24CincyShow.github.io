<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Open a printable flyer for the L24 Cincy Car, Truck &amp; Bike Show with event details and registration information.">

<title>Printable Flyer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    background:white;
}

body{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:20px;
}

.flyer-container{
    width:100%;
    max-width:850px;
}

.flyer-container img{
    width:100%;
    height:auto;
    display:block;
    box-shadow:0 0 25px rgba(0,0,0,.35);
}

@media print{

    @page{
        size:letter portrait;
        margin:0;
    }

    html, body{
        background:white;
    }

    body{
        padding:0;
        margin:0;
    }

    .flyer-container{
        width:8.5in;
        max-width:8.5in;
    }

    .flyer-container img{
        width:100%;
        height:auto;
        box-shadow:none;
    }

}

</style>
</head>

<body>

<div class="flyer-container">

<img src="final-flyer.png" alt="L24 Cincy Car Show Flyer">

</div>

</body>
</html>
